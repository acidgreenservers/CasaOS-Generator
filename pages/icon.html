<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CasaOS Generator - Icon Management</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="../assets/logo.svg">
    <link rel="shortcut icon" type="image/svg+xml" href="../assets/logo.svg">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Shared Base Styles -->
    <link rel="stylesheet" href="../css/base.css">

    <style>
        body { padding: 80px 20px 20px; }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: start;
        }

        .upload-area {
            border: 2px dashed rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            transition: all 0.3s ease;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .upload-area:hover,
        .upload-area.dragover {
            border-color: #2b9fd8;
            background: rgba(43,159,216,0.08);
        }

        .upload-icon { font-size: 3rem; margin-bottom: 15px; opacity: 0.7; }
        .upload-text { font-size: 1.1rem; margin-bottom: 10px; }
        .upload-hint { font-size: 0.9rem; color: #9aa5b5; }
        .file-input { display: none; }

        .icon-preview {
            margin-top: 20px;
            text-align: center;
        }

        .preview-image {
            max-width: 120px;
            max-height: 120px;
            border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.15);
        }

        .icon-info {
            margin-top: 10px;
            font-size: 0.9rem;
            color: #c8d0dc;
        }

        .icon-actions {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .asset-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            background: #1a2438;
            border-radius: 8px;
            margin-bottom: 8px;
            border: 1px solid rgba(255,255,255,0.04);
        }

        .asset-icon {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            object-fit: cover;
        }

        .asset-name { flex: 1; font-size: 0.9rem; }
        .asset-size { font-size: 0.8rem; color: #9aa5b5; }

        .asset-actions { display: flex; gap: 5px; }

        .url-section { margin-top: 24px; }

        .preview-section {
            position: sticky;
            top: 100px;
        }

        @media (max-width: 1024px) {
            .container { grid-template-columns: 1fr; gap: 30px; }
            .preview-section { position: static; }
        }

        @media (max-width: 768px) {
            body { padding: 80px 15px 20px; }
        }
    </style>
</head>
<body>
    <!-- Background System -->
    <div class="background">
        <div class="bg-left"></div>
        <div class="bg-right"></div>
        <div class="bg-bottom"></div>
    </div>

    <!-- Header -->
    <header class="header">
        <a href="../index.html" class="brand">
            <div class="brand-logo">
                <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="20" cy="32" r="12" fill="#87CEEB" style="filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));"/>
                    <circle cx="32" cy="28" r="18" fill="#1E90FF" style="filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));"/>
                    <circle cx="44" cy="32" r="12" fill="#87CEEB" style="filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));"/>
                </svg>
            </div>
            casaos
        </a>
        <div style="display:flex; gap:8px; align-items:center;">
            <a href="generator.html" class="btn btn-ghost btn-sm">← Generator</a>
            <a href="screenshots.html" class="btn btn-primary btn-sm">Next: Screenshots →</a>
        </div>
    </header>

    <!-- Content Well -->
    <div class="content-well">
        <div class="container">
            <!-- Icon Management -->
            <div class="panel">
                <h2 class="panel-title">Icon Management</h2>

                <div id="uploadArea" class="upload-area">
                    <div class="upload-icon">🖼️</div>
                    <div class="upload-text">Upload Custom Icon</div>
                    <div class="upload-hint">Drag & drop or click to select (PNG, JPG, SVG)</div>
                    <input type="file" id="iconFile" class="file-input" accept="image/*">
                </div>

                <div class="url-section">
                    <div class="form-group">
                        <label class="form-label">Or use Icon URL:</label>
                        <div style="display:flex; gap:10px;">
                            <input type="url" id="iconUrl" class="form-input" placeholder="https://example.com/icon.png">
                            <button id="loadUrlBtn" class="btn btn-primary">Load</button>
                        </div>
                    </div>
                </div>

                <div id="iconPreview" class="icon-preview" style="display: none;">
                    <img id="previewImage" class="preview-image" src="" alt="Icon Preview">
                    <div class="icon-info">
                        <div id="iconFileName"></div>
                        <div id="iconDimensions"></div>
                    </div>
                    <div class="icon-actions">
                        <button id="useIconBtn" class="btn btn-success">✅ Use This Icon</button>
                        <button id="clearIconBtn" class="btn btn-ghost">Clear</button>
                    </div>
                </div>
            </div>

            <!-- Assets Preview -->
            <div class="panel preview-section">
                <div class="preview-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:10px;">
                    <h3 class="panel-title" style="margin-bottom:0;">Project Assets</h3>
                    <button id="nextBtn" class="btn btn-primary btn-sm">Next: Screenshots →</button>
                </div>

                <div id="assetsList">
                    <div class="panel-secondary" style="margin-bottom:15px;">
                        <h4 class="form-label" style="font-size:1rem;">Icons</h4>
                        <div id="iconsList">
                            <p class="text-muted" style="padding:16px 0; text-align:center;">No icons uploaded yet</p>
                        </div>
                    </div>
                    <div class="panel-secondary">
                        <h4 class="form-label" style="font-size:1rem;">Screenshots</h4>
                        <div id="screenshotsList">
                            <p class="text-muted" style="padding:16px 0; text-align:center;">No screenshots uploaded yet</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Progress Indicator -->
    <div class="progress-container">
        <div class="progress-step completed"></div>
        <div class="progress-step completed"></div>
        <div class="progress-step active"></div>
        <div class="progress-step"></div>
        <div class="progress-step"></div>
        <div class="progress-step"></div>
    </div>

    <script type="module">
        import { getAssets, saveAssets } from '../modules/storage.js';
        import { processImageToPng } from '../modules/asset-processor.js';
        import { formatFileSize } from '../modules/ui-utils.js';
        import { initAppNotice } from '../modules/app-notice.js';

        // Initialize app notice
        document.addEventListener('DOMContentLoaded', () => initAppNotice('../'));

        class IconManager {
            constructor() {
                this.currentIcon = null;
                this.init();
            }

            init() {
                this.setupEventListeners();
                this.loadSavedAssets();
                this.updateProgress();
            }

            setupEventListeners() {
                const uploadArea = document.getElementById('uploadArea');
                const fileInput = document.getElementById('iconFile');
                const iconUrl = document.getElementById('iconUrl');
                const loadUrlBtn = document.getElementById('loadUrlBtn');
                const useIconBtn = document.getElementById('useIconBtn');
                const clearIconBtn = document.getElementById('clearIconBtn');
                const nextBtn = document.getElementById('nextBtn');

                uploadArea.addEventListener('click', () => fileInput.click());
                fileInput.addEventListener('change', (e) => {
                    if (e.target.files[0]) this.handleFileUpload(e.target.files[0]);
                });
                uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.classList.add('dragover'); });
                uploadArea.addEventListener('dragleave', () => { uploadArea.classList.remove('dragover'); });
                uploadArea.addEventListener('drop', (e) => {
                    e.preventDefault();
                    uploadArea.classList.remove('dragover');
                    if (e.dataTransfer.files[0]) this.handleFileUpload(e.dataTransfer.files[0]);
                });
                loadUrlBtn.addEventListener('click', () => {
                    const url = iconUrl.value.trim();
                    if (url) this.handleUrlUpload(url);
                });
                useIconBtn.addEventListener('click', () => this.saveIcon());
                clearIconBtn.addEventListener('click', () => this.clearIcon());
                nextBtn.addEventListener('click', () => this.nextStep());
            }

            handleFileUpload(file) {
                if (!file.type.startsWith('image/')) { alert('Please select an image file'); return; }
                const reader = new FileReader();
                reader.onload = (e) => this.processImage(e.target.result, file.name);
                reader.readAsDataURL(file);
            }

            handleUrlUpload(url) {
                fetch(url)
                    .then(r => { if (!r.ok) throw new Error('Failed to load image'); return r.blob(); })
                    .then(blob => {
                        const reader = new FileReader();
                        reader.onload = (e) => this.processImage(e.target.result, url.split('/').pop());
                        reader.readAsDataURL(blob);
                    })
                    .catch(error => alert('Failed to load image from URL: ' + error.message));
            }

            async processImage(dataUrl, fileName) {
                try {
                    const result = await processImageToPng(dataUrl);
                    this.currentIcon = { name: fileName, data: result.dataUrl, size: result.size, dimensions: result.dimensions, type: 'icon' };
                    this.showPreview(result.dataUrl, fileName, result.dimensions, formatFileSize(result.size));
                } catch (err) { alert('Failed to process image: ' + err.message); }
            }

            showPreview(dataUrl, fileName, dimensions, fileSize) {
                const preview = document.getElementById('iconPreview');
                document.getElementById('previewImage').src = dataUrl;
                document.getElementById('iconFileName').textContent = `File: ${fileName}`;
                document.getElementById('iconDimensions').textContent = `Size: ${dimensions} (${fileSize})`;
                preview.style.display = 'block';
            }

            saveIcon() {
                if (!this.currentIcon) return;
                const assets = getAssets();
                assets.icons = [this.currentIcon];
                saveAssets(assets);
                this.updateAssetsList();
                this.showSuccess('Icon saved successfully!');
            }

            clearIcon() {
                this.currentIcon = null;
                document.getElementById('iconPreview').style.display = 'none';
                document.getElementById('iconFile').value = '';
                document.getElementById('iconUrl').value = '';
            }

            loadSavedAssets() { this.updateAssetsList(); }

            updateAssetsList() {
                const assets = getAssets();
                document.getElementById('iconsList').innerHTML = assets.icons.length > 0
                    ? assets.icons.map(icon => `
                        <div class="asset-item">
                            <img src="${icon.data}" alt="${icon.name}" class="asset-icon">
                            <span class="asset-name">${icon.name}</span>
                            <span class="asset-size">${icon.dimensions}</span>
                            <div class="asset-actions">
                                <button class="btn btn-ghost btn-icon" onclick="iconManager.viewAsset('${icon.data}')">👁</button>
                                <button class="btn btn-danger btn-icon" onclick="iconManager.removeAsset('icons', 0)">×</button>
                            </div>
                        </div>
                    `).join('')
                    : '<p class="text-muted" style="padding:16px 0; text-align:center;">No icons uploaded yet</p>';
                document.getElementById('screenshotsList').innerHTML = assets.screenshots.length > 0
                    ? assets.screenshots.map((s, i) => `
                        <div class="asset-item">
                            <img src="${s.data}" alt="${s.name}" class="asset-icon">
                            <span class="asset-name">${s.name}</span>
                            <span class="asset-size">${s.dimensions}</span>
                            <div class="asset-actions">
                                <button class="btn btn-ghost btn-icon" onclick="iconManager.viewAsset('${s.data}')">👁</button>
                                <button class="btn btn-danger btn-icon" onclick="iconManager.removeAsset('screenshots', ${i})">×</button>
                            </div>
                        </div>
                    `).join('')
                    : '<p class="text-muted" style="padding:16px 0; text-align:center;">No screenshots uploaded yet</p>';
            }

            removeAsset(type, index) {
                const assets = getAssets();
                assets[type].splice(index, 1);
                saveAssets(assets);
                this.updateAssetsList();
            }

            viewAsset(dataUrl) { window.open(dataUrl, '_blank'); }

            showSuccess(message) {
                const btn = document.getElementById('useIconBtn');
                const ot = btn.innerHTML;
                btn.innerHTML = '✅ ' + message;
                btn.style.background = 'linear-gradient(135deg, #1e8e3e 0%, #28a745 100%)';
                setTimeout(() => { btn.innerHTML = ot; btn.style.background = ''; }, 2000);
            }

            nextStep() { saveAssets(getAssets()); window.location.href = 'screenshots.html'; }

            updateProgress() {
                document.querySelectorAll('.progress-step').forEach((s, i) => { if (i <= 2) s.classList.add('completed'); if (i === 2) s.classList.add('active'); });
            }
        }

        let iconManager;
        document.addEventListener('DOMContentLoaded', () => { iconManager = new IconManager(); });
    </script>
</body>
</html>
