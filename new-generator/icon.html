<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CasaOS Generator - Icon Management</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background:
                radial-gradient(ellipse at 20% 80%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(255, 255, 255, 0.1) 0%, transparent 50%),
                linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #ffffff;
            padding: 80px 20px 20px;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            width: 40px;
            height: 40px;
        }

        .logo-text {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 8px 16px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .btn:hover {
            background: rgba(255,255,255,0.2);
            border-color: rgba(255,255,255,0.5);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: #667eea;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }

        .btn-success {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            border-color: #28a745;
        }

        .btn-success:hover {
            background: linear-gradient(135deg, #20c997 0%, #28a745 100%);
        }

        /* Main Container */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: start;
        }

        /* Icon Management Section */
        .icon-section {
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 25px;
            color: #ffffff;
        }

        .upload-area {
            border: 2px dashed rgba(255,255,255,0.3);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .upload-area:hover,
        .upload-area.dragover {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.1);
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            opacity: 0.7;
        }

        .upload-text {
            font-size: 1.1rem;
            margin-bottom: 10px;
        }

        .upload-hint {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.7);
        }

        .file-input {
            display: none;
        }

        .icon-preview {
            margin-top: 20px;
            text-align: center;
        }

        .preview-image {
            max-width: 120px;
            max-height: 120px;
            border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.3);
        }

        .icon-info {
            margin-top: 10px;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.8);
        }

        .icon-actions {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        /* URL Input Section */
        .url-section {
            margin-top: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: rgba(255,255,255,0.9);
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 8px;
            color: white;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(255,255,255,0.15);
        }

        .form-control::placeholder {
            color: rgba(255,255,255,0.6);
        }

        /* Preview Section */
        .preview-section {
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            position: sticky;
            top: 100px;
        }

        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .preview-title {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .preview-actions {
            display: flex;
            gap: 10px;
        }

        .asset-preview {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
        }

        .asset-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 6px;
            margin-bottom: 8px;
        }

        .asset-icon {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            object-fit: cover;
        }

        .asset-name {
            flex: 1;
            font-size: 0.9rem;
        }

        .asset-size {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.7);
        }

        .asset-actions {
            display: flex;
            gap: 5px;
        }

        .btn-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 12px;
        }

        .btn-remove {
            background: #dc3545;
            color: white;
        }

        .btn-view {
            background: #667eea;
            color: white;
        }

        /* Progress Indicator */
        .progress-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 1000;
        }

        .progress-step {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255,255,255,0.4);
            transition: all 0.3s ease;
        }

        .progress-step.active {
            background: #667eea;
            transform: scale(1.2);
        }

        .progress-step.completed {
            background: #28a745;
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
                gap: 30px;
            }

            .preview-section {
                position: static;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 80px 15px 20px;
            }

            .icon-section,
            .preview-section {
                padding: 20px;
            }

            .header {
                padding: 15px;
            }

            .nav-buttons {
                flex-wrap: wrap;
                gap: 8px;
            }

            .btn {
                padding: 6px 12px;
                font-size: 0.8rem;
            }
        }

        /* Theme Support */
        body.dark {
            background:
                radial-gradient(ellipse at 20% 80%, rgba(77, 171, 247, 0.2) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(255, 255, 255, 0.05) 0%, transparent 50%),
                linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
        }

        body.dark .icon-section,
        body.dark .preview-section {
            background: rgba(30,30,30,0.8);
            border-color: rgba(255,255,255,0.1);
        }

        body.dark .form-control {
            background: rgba(0,0,0,0.5);
            border-color: rgba(255,255,255,0.2);
        }

        body.dark .form-control:focus {
            background: rgba(0,0,0,0.7);
            border-color: #667eea;
        }

        body.dark .upload-area {
            border-color: rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.2);
        }

        body.dark .upload-area:hover,
        body.dark .upload-area.dragover {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.1);
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="logo-container">
            <svg class="logo" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
                <circle cx="20" cy="32" r="12" fill="#87CEEB"/>
                <circle cx="32" cy="28" r="18" fill="#1E90FF"/>
                <circle cx="44" cy="32" r="12" fill="#87CEEB"/>
            </svg>
            <span class="logo-text">CasaOS Generator</span>
        </div>

        <div class="nav-buttons">
            <a href="generator.html" class="btn">← Generator</a>
            <a href="screenshots.html" class="btn btn-primary">Next: Screenshots →</a>
        </div>
    </header>

    <!-- Main Content -->
    <div class="container">
        <!-- Icon Management -->
        <div class="icon-section">
            <h2 class="section-title">Icon Management</h2>

            <!-- File Upload Area -->
            <div id="uploadArea" class="upload-area">
                <div class="upload-icon">🖼️</div>
                <div class="upload-text">Upload Custom Icon</div>
                <div class="upload-hint">Drag & drop or click to select (PNG, JPG, SVG)</div>
                <input type="file" id="iconFile" class="file-input" accept="image/*">
            </div>

            <!-- URL Input -->
            <div class="url-section">
                <div class="form-group">
                    <label class="form-label">Or use Icon URL:</label>
                    <input type="url" id="iconUrl" class="form-control" placeholder="https://example.com/icon.png">
                </div>
                <button id="loadUrlBtn" class="btn btn-primary">Load from URL</button>
            </div>

            <!-- Icon Preview -->
            <div id="iconPreview" class="icon-preview" style="display: none;">
                <img id="previewImage" class="preview-image" src="" alt="Icon Preview">
                <div class="icon-info">
                    <div id="iconFileName"></div>
                    <div id="iconDimensions"></div>
                </div>
                <div class="icon-actions">
                    <button id="useIconBtn" class="btn btn-success">✅ Use This Icon</button>
                    <button id="clearIconBtn" class="btn">Clear</button>
                </div>
            </div>
        </div>

        <!-- Assets Preview -->
        <div class="preview-section">
            <div class="preview-header">
                <h3 class="preview-title">Project Assets</h3>
                <div class="preview-actions">
                    <button id="nextBtn" class="btn btn-primary">Next: Screenshots →</button>
                </div>
            </div>

            <div id="assetsList">
                <div class="asset-preview">
                    <h4>Icons</h4>
                    <div id="iconsList">
                        <p style="color: rgba(255,255,255,0.6);">No icons uploaded yet</p>
                    </div>
                </div>

                <div class="asset-preview">
                    <h4>Screenshots</h4>
                    <div id="screenshotsList">
                        <p style="color: rgba(255,255,255,0.6);">No screenshots uploaded yet</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Progress Indicator -->
    <div class="progress-container">
        <div class="progress-step completed"></div>
        <div class="progress-step completed"></div>
        <div class="progress-step active"></div>
        <div class="progress-step"></div>
        <div class="progress-step"></div>
        <div class="progress-step"></div>
    </div>

    <script>
        class IconManager {
            constructor() {
                this.currentIcon = null;
                this.iconData = null;
                this.init();
            }

            init() {
                this.setupEventListeners();
                this.loadSavedAssets();
                this.updateProgress();
            }

            setupEventListeners() {
                const uploadArea = document.getElementById('uploadArea');
                const fileInput = document.getElementById('iconFile');
                const iconUrl = document.getElementById('iconUrl');
                const loadUrlBtn = document.getElementById('loadUrlBtn');
                const useIconBtn = document.getElementById('useIconBtn');
                const clearIconBtn = document.getElementById('clearIconBtn');
                const nextBtn = document.getElementById('nextBtn');

                // Upload area click
                uploadArea.addEventListener('click', () => {
                    fileInput.click();
                });

                // File input change
                fileInput.addEventListener('change', (e) => {
                    if (e.target.files[0]) {
                        this.handleFileUpload(e.target.files[0]);
                    }
                });

                // Drag and drop
                uploadArea.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    uploadArea.classList.add('dragover');
                });

                uploadArea.addEventListener('dragleave', () => {
                    uploadArea.classList.remove('dragover');
                });

                uploadArea.addEventListener('drop', (e) => {
                    e.preventDefault();
                    uploadArea.classList.remove('dragover');
                    if (e.dataTransfer.files[0]) {
                        this.handleFileUpload(e.dataTransfer.files[0]);
                    }
                });

                // URL input
                loadUrlBtn.addEventListener('click', () => {
                    const url = iconUrl.value.trim();
                    if (url) {
                        this.handleUrlUpload(url);
                    }
                });

                // Icon actions
                useIconBtn.addEventListener('click', () => {
                    this.saveIcon();
                });

                clearIconBtn.addEventListener('click', () => {
                    this.clearIcon();
                });

                nextBtn.addEventListener('click', () => {
                    this.nextStep();
                });
            }

            handleFileUpload(file) {
                if (!file.type.startsWith('image/')) {
                    alert('Please select an image file');
                    return;
                }

                const reader = new FileReader();
                reader.onload = (e) => {
                    this.processImage(e.target.result, file.name);
                };
                reader.readAsDataURL(file);
            }

            handleUrlUpload(url) {
                fetch(url)
                    .then(response => {
                        if (!response.ok) throw new Error('Failed to load image');
                        return response.blob();
                    })
                    .then(blob => {
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            this.processImage(e.target.result, url.split('/').pop());
                        };
                        reader.readAsDataURL(blob);
                    })
                    .catch(error => {
                        alert('Failed to load image from URL: ' + error.message);
                    });
            }

            processImage(dataUrl, fileName) {
                const img = new Image();
                img.onload = () => {
                    // Convert to PNG
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');

                    // Set canvas size (square aspect ratio, max 256px)
                    const size = Math.min(img.width, img.height, 256);
                    canvas.width = size;
                    canvas.height = size;

                    // Center and crop
                    const offsetX = (img.width - size) / 2;
                    const offsetY = (img.height - size) / 2;
                    ctx.drawImage(img, offsetX, offsetY, size, size, 0, 0, size, size);

                    // Convert to PNG data URL
                    canvas.toBlob((blob) => {
                        const pngReader = new FileReader();
                        pngReader.onload = (e) => {
                            this.currentIcon = {
                                name: fileName,
                                data: e.target.result,
                                size: blob.size,
                                dimensions: `${size}x${size}`,
                                type: 'icon'
                            };
                            this.showPreview(e.target.result, fileName, `${size}x${size}`, this.formatFileSize(blob.size));
                        };
                        pngReader.readAsDataURL(blob);
                    }, 'image/png');
                };
                img.src = dataUrl;
            }

            showPreview(dataUrl, fileName, dimensions, fileSize) {
                const preview = document.getElementById('iconPreview');
                const previewImage = document.getElementById('previewImage');
                const iconFileName = document.getElementById('iconFileName');
                const iconDimensions = document.getElementById('iconDimensions');

                previewImage.src = dataUrl;
                iconFileName.textContent = `File: ${fileName}`;
                iconDimensions.textContent = `Size: ${dimensions} (${fileSize})`;
                preview.style.display = 'block';
            }

            saveIcon() {
                if (!this.currentIcon) return;

                // Save to localStorage
                const assets = this.getAssets();
                assets.icons = [this.currentIcon];
                localStorage.setItem('casaos-generator-assets', JSON.stringify(assets));

                this.updateAssetsList();
                this.showSuccess('Icon saved successfully!');
            }

            clearIcon() {
                this.currentIcon = null;
                document.getElementById('iconPreview').style.display = 'none';
                document.getElementById('iconFile').value = '';
                document.getElementById('iconUrl').value = '';
            }

            getAssets() {
                const saved = localStorage.getItem('casaos-generator-assets');
                return saved ? JSON.parse(saved) : { icons: [], screenshots: [] };
            }

            loadSavedAssets() {
                this.updateAssetsList();
            }

            updateAssetsList() {
                const assets = this.getAssets();
                const iconsList = document.getElementById('iconsList');
                const screenshotsList = document.getElementById('screenshotsList');

                // Update icons list
                if (assets.icons.length > 0) {
                    iconsList.innerHTML = assets.icons.map(icon => `
                        <div class="asset-item">
                            <img src="${icon.data}" alt="${icon.name}" class="asset-icon">
                            <span class="asset-name">${icon.name}</span>
                            <span class="asset-size">${icon.dimensions}</span>
                            <div class="asset-actions">
                                <button class="btn-icon btn-view" onclick="iconManager.viewAsset('${icon.data}')">👁</button>
                                <button class="btn-icon btn-remove" onclick="iconManager.removeAsset('icons', 0)">×</button>
                            </div>
                        </div>
                    `).join('');
                } else {
                    iconsList.innerHTML = '<p style="color: rgba(255,255,255,0.6);">No icons uploaded yet</p>';
                }

                // Update screenshots list
                if (assets.screenshots.length > 0) {
                    screenshotsList.innerHTML = assets.screenshots.map((screenshot, index) => `
                        <div class="asset-item">
                            <img src="${screenshot.data}" alt="${screenshot.name}" class="asset-icon">
                            <span class="asset-name">${screenshot.name}</span>
                            <span class="asset-size">${screenshot.dimensions}</span>
                            <div class="asset-actions">
                                <button class="btn-icon btn-view" onclick="iconManager.viewAsset('${screenshot.data}')">👁</button>
                                <button class="btn-icon btn-remove" onclick="iconManager.removeAsset('screenshots', ${index})">×</button>
                            </div>
                        </div>
                    `).join('');
                } else {
                    screenshotsList.innerHTML = '<p style="color: rgba(255,255,255,0.6);">No screenshots uploaded yet</p>';
                }
            }

            removeAsset(type, index) {
                const assets = this.getAssets();
                assets[type].splice(index, 1);
                localStorage.setItem('casaos-generator-assets', JSON.stringify(assets));
                this.updateAssetsList();
            }

            viewAsset(dataUrl) {
                window.open(dataUrl, '_blank');
            }

            formatFileSize(bytes) {
                if (bytes === 0) return '0 Bytes';
                const k = 1024;
                const sizes = ['Bytes', 'KB', 'MB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
            }

            showSuccess(message) {
                const btn = document.getElementById('useIconBtn');
                const originalText = btn.innerHTML;
                btn.innerHTML = '✅ ' + message;
                btn.style.background = 'linear-gradient(135deg, #28a745 0%, #20c997 100%)';
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.style.background = '';
                }, 2000);
            }

            nextStep() {
                // Save current state
                localStorage.setItem('casaos-generator-assets', JSON.stringify(this.getAssets()));
                window.location.href = 'screenshots.html';
            }

            updateProgress() {
                const progressSteps = document.querySelectorAll('.progress-step');
                progressSteps.forEach((step, index) => {
                    if (index <= 2) step.classList.add('completed');
                    if (index === 2) step.classList.add('active');
                });
            }
        }

        // Initialize when DOM is loaded
        let iconManager;
        document.addEventListener('DOMContentLoaded', () => {
            iconManager = new IconManager();
        });
    </script>
</body>
</html>
