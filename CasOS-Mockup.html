<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>CasaOS – Branded Canvas</title>

<style>
/* =========================
   RESET
========================= */
* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: #070b17;
  color: #ffffff;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
}

/* =========================
   ROOT CANVAS
========================= */
.canvas {
  position: relative;
  width: 100%;
  min-height: 100vh;
  overflow-x: hidden;
}

/* =========================
   BACKGROUND SYSTEM
========================= */
.background {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
}

/* Large left depth blob */
.bg-left {
  position: absolute;
  width: 1200px;
  height: 1200px;
  left: -420px;
  top: -320px;
  border-radius: 50%;
  background: radial-gradient(
    circle at top left,
    #1f7fc4 0%,
    #0b2a4f 55%,
    #070b17 100%
  );
}

/* Right cyan glow */
.bg-right {
  position: absolute;
  width: 1000px;
  height: 1000px;
  right: -420px;
  top: -240px;
  border-radius: 50%;
  background: linear-gradient(
    180deg,
    #5fe0ff 0%,
    #2b9fd8 100%
  );
  opacity: 0.95;
}

/* Bottom accent */
.bg-bottom {
  position: absolute;
  width: 520px;
  height: 520px;
  left: -160px;
  bottom: -260px;
  border-radius: 50%;
  background: linear-gradient(
    180deg,
    #2fb3ff,
    #1584d6
  );
  opacity: 0.9;
}

/* =========================
   HEADER (PRESERVED)
========================= */
.header {
  position: relative;
  z-index: 10;
  height: 72px;
  padding: 0 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;

  background: linear-gradient(
    180deg,
    rgba(7,11,23,0.95),
    rgba(7,11,23,0.65)
  );
  backdrop-filter: blur(2px);
}

/* Brand */
.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 22px;
  font-weight: 500;
  letter-spacing: 0.2px;
}

.brand-logo {
  width: 34px;
  height: 20px;
  position: relative;
}

.brand-logo::before,
.brand-logo::after {
  content: "";
  position: absolute;
  border-radius: 50%;
}

.brand-logo::before {
  width: 20px;
  height: 20px;
  background: #3fd2ff;
  left: 0;
}

.brand-logo::after {
  width: 20px;
  height: 20px;
  background: #1fa4ff;
  left: 14px;
}

/* GitHub pill */
.github-pill {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 14px;
  border-radius: 10px;
  background: #2a2f3a;
  color: #d1d5db;
  font-size: 14px;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
}

/* =========================
   CONTENT WELL (EMPTY)
========================= */
.content-well {
  position: relative;
  z-index: 5;
  min-height: calc(100vh - 72px);
  padding: 120px 0;
}

/* Optional subtle center guide (non-visual aid)
   Uncomment if you want alignment help during dev
*/
/*
.content-well::before {
  content: "";
  position: absolute;
  top: 0;
  left: 50%;
  width: 1100px;
  height: 100%;
  transform: translateX(-50%);
  border-left: 1px dashed rgba(255,255,255,0.05);
  border-right: 1px dashed rgba(255,255,255,0.05);
  pointer-events: none;
}
*/
</style>
</head>

<body>
<div class="canvas">

  <!-- Background -->
  <div class="background">
    <div class="bg-left"></div>
    <div class="bg-right"></div>
    <div class="bg-bottom"></div>
  </div>

  <!-- Header -->
  <div class="header">
    <div class="brand">
      <div class="brand-logo"></div>
      casaos
    </div>
    <div class="github-pill">
      ★ Star 33.9k
    </div>
  </div>

  <!-- Empty branded canvas -->
  <div class="content-well">
    <!-- 
      Intentionally empty.
      Drop your Appstore Generator UI here.
    -->
  </div>

</div>
</body>
</html>
